name: Deploy to AWS

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
  S3_BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.DISTRIBUTION_NAME }}
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Zenatech

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          if [ -z "${AWS_REGION:-}" ]; then
            echo "::error title=Missing AWS region::The REGION repository secret is missing or empty."
            missing=1
          else
            echo "AWS_REGION=${AWS_REGION}"
          fi

          if [ -z "${AWS_ACCOUNT_ID:-}" ]; then
            echo "::error title=Missing AWS account ID::The ACCOUNT_ID repository secret is missing or empty."
            missing=1
          fi

          if [ -z "${S3_BUCKET_NAME:-}" ]; then
            echo "::error title=Missing S3 bucket::The BUCKET_NAME repository secret is missing or empty."
            missing=1
          else
            echo "S3_BUCKET_NAME=${S3_BUCKET_NAME}"
          fi

          if [ -z "${CLOUDFRONT_DISTRIBUTION_ID:-}" ]; then
            echo "::error title=Missing CloudFront ID::The DISTRIBUTION_NAME repository secret is missing or empty."
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            echo "::error::Deployment configuration validation failed."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          npm ci

      - name: Build the app
        shell: bash
        run: |
          set -euxo pipefail
          npm run build

          if [ ! -d "dist" ]; then
            echo "::error title=Build output missing::The dist directory was not created."
            exit 1
          fi

          if [ ! -f "dist/index.html" ]; then
            echo "::error title=index.html missing::dist/index.html was not created."
            exit 1
          fi

          echo "Build output:"
          find dist -maxdepth 2 -type f | head -100

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com
          role-session-name: github-actions-frontend-deploy

      - name: Verify AWS identity
        shell: bash
        run: |
          set -euxo pipefail
          aws sts get-caller-identity
          aws configure list
          aws s3api get-bucket-location \
            --bucket "${S3_BUCKET_NAME}"

      - name: Deploy to S3
        shell: bash
        run: |
          set -euxo pipefail

          aws s3 sync dist/ "s3://${S3_BUCKET_NAME}" \
            --delete \
            --only-show-errors

          echo "S3 deployment completed successfully."

      - name: Invalidate CloudFront cache
        shell: bash
        run: |
          set -euxo pipefail

          invalidation_id="$(
            aws cloudfront create-invalidation \
              --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
              --paths "/*" \
              --query "Invalidation.Id" \
              --output text
          )"

          if [ -z "${invalidation_id}" ] || [ "${invalidation_id}" = "None" ]; then
            echo "::error title=Invalidation failed::CloudFront did not return an invalidation ID."
            exit 1
          fi

          echo "CloudFront invalidation created: ${invalidation_id}"
